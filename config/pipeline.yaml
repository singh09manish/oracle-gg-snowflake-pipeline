# Oracle RDS → GoldenGate 19c → GG BigData 21c → Snowflake
#
# IMPORTANT: Tables are NOT defined here.
# The table inventory lives in the Excel file (input/table_inventory.xlsx).
# This file only contains infrastructure settings.

# -------------------------------------------------------------------
# Source — Oracle RDS
# -------------------------------------------------------------------
source:
  alias: "rds_ogg"                    # GG credential store alias
  exclude_user: "GG_EXTRACT_USER"     # Exclude GG user's own DML

# -------------------------------------------------------------------
# Grouping — advisory threshold (actual groups are defined in the inventory)
# -------------------------------------------------------------------
grouping:
  max_tables_per_group: 75            # advisory warning threshold (GG best practice: 50-75)

# -------------------------------------------------------------------
# GoldenGate 19c Classic (Extract + Pump)
# -------------------------------------------------------------------
gg19c:
  home: /oracle/product/19c/oggcore_1
  oracle_home: /u01/app/oracle/opt/oracle/instantclient_19_30

  manager:
    port: 7809
    dynamic_port_list: "7810-7830"    # wide range for N extract + N pump processes
    autorestart_retries: 10
    autorestart_wait_minutes: 3
    purge_min_keep_hours: 48

  extract:
    # Auto-tuned by generator based on tables/group:
    #   <=50 tables:  256 MB, parallelism 2
    #   50-100:       356 MB, parallelism 2
    #   100+:         456+ MB, parallelism 4
    max_sga_size_mb: 256              # base — generator may increase
    parallelism: 2                    # base — generator may increase

  trail:
    dir: "./dirdat"
    size_mb: 2000                     # 2 GB per trail file (production standard)
    encryption:
      enabled: true
      algorithm: "AES256"
      keyname: "src_trail_key"

  pump:
    target_host: "localhost"
    target_manager_port: 7909
    target_trail_dir: "./dirdat"

# -------------------------------------------------------------------
# GoldenGate BigData 21c (Replicat → Snowflake via JDBC)
# -------------------------------------------------------------------
gg21c:
  home: /oracle/product/21c/oggbd_1
  java_home: /usr/lib/jvm/java-11-openjdk-11.0.25.0.9-2.el8.x86_64

  manager:
    port: 7909
    dynamic_port_list: "7910-7930"    # wide range for N replicat processes
    autorestart_retries: 5
    autorestart_wait_minutes: 2
    purge_min_keep_hours: 48

  trail:
    dir: "./dirdat"

  replicat:
    grouptransops: 5000               # batch commit every 5000 tx (Snowflake optimized)
    maxtransops: 20000

  snowflake:
    account: "your_account"           # e.g. xy12345.us-east-1
    warehouse: "YOUR_WH"
    database: "YOUR_DB"
    role: "GG_ROLE"
    jdbc_jar: "snowflake-jdbc-3.14.4.jar"

# -------------------------------------------------------------------
# Archive
# -------------------------------------------------------------------
archive:
  enabled: true
  archive_dir: "/mnt/archive/trails"
  min_age_hours: 48

# -------------------------------------------------------------------
# Audit
# -------------------------------------------------------------------
audit:
  parallel_workers: 4                 # conservative — 4 concurrent Oracle queries

# Oracle RDS → GoldenGate 19c → GG BigData 21c → Snowflake
#
# IMPORTANT: Tables are NOT defined here.
# The table inventory lives in the Excel file (input/table_inventory.xlsx).
# This file only contains infrastructure settings.

# -------------------------------------------------------------------
# Source — Oracle RDS
# -------------------------------------------------------------------
source:
  alias: "rdsadmin"                   # GG credential store alias (USERIDALIAS)

# -------------------------------------------------------------------
# Grouping — advisory threshold (actual groups are defined in the inventory)
# -------------------------------------------------------------------
grouping:
  max_tables_per_group: 75            # advisory warning threshold (GG best practice: 50-75)

# -------------------------------------------------------------------
# GoldenGate 19c Classic (Extract + Pump)
# -------------------------------------------------------------------
gg19c:
  home: /u01/app/oracle/product/19c/oggcore_1

  manager:
    port: 7809
    dynamic_port_list: "7810-7830"
    autorestart_retries: 3
    autorestart_wait_minutes: 5
    resetminutes: 60
    purge_min_keep_days: 2
    purge_markers_keep_days: 2
    lag_info_minutes: 5
    lag_critical_minutes: 30

  trail:
    dir: "./dirdat"
    encryption:
      enabled: true
      algorithm: "AES256"             # AES256 trail encryption at rest
      keyname: "src_trail_key"        # ENCKEYS file must be provisioned

  pump:
    target_host: "localhost"
    target_manager_port: 7909
    target_trail_dir: "/u01/app/oracle/product/21c/oggbd_1/dirdat"
    encrypt_rmthost: true               # OGG_AES256_GCM for data in transit

# -------------------------------------------------------------------
# GoldenGate BigData 21c (Replicat → Snowflake via JDBC)
# -------------------------------------------------------------------
gg21c:
  home: /u01/app/oracle/product/21c/oggbd_1
  java_home: /usr/lib/jvm/java-11-openjdk-11.0.25.0.9-2.el8.x86_64

  manager:
    port: 7999
    dynamic_port_list: "7910-7920"
    autorestart_retries: 5
    autorestart_wait_minutes: 3
    purge_min_keep_days: 3
    lag_info_minutes: 30
    lag_critical_minutes: 60

  trail:
    dir: "./dirdat"

  replicat:
    grouptransops: 1000
    maxtransops: 1000

  snowflake:
    account: "your_account"           # e.g. xy12345.us-east-1
    warehouse: "YOUR_WH"
    database: "YOUR_DB"
    role: "GG_ROLE"
    jdbc_jar: "snowflake-jdbc-3.14.4.jar"

# -------------------------------------------------------------------
# Archive — trail file archival before manager purges them
# -------------------------------------------------------------------
archive:
  enabled: true
  archive_dir: "/mnt/archive/trails"  # local dir, NFS mount, or S3 prefix
  min_age_hours: 24                   # only archive trails older than this
  s3:
    enabled: false                    # set true to archive to S3 instead of local
    bucket: "your-bucket"
    prefix: "gg-trails"
    region: "us-east-1"

# -------------------------------------------------------------------
# Monitoring & Alerting
# -------------------------------------------------------------------
monitoring:
  # Health check thresholds
  lag_warn_seconds: 300               # 5 min — warn
  lag_critical_seconds: 1800          # 30 min — critical alert
  trail_disk_warn_gb: 50              # disk usage threshold

  # Alerting channels (configure one or more)
  alerting:
    # Email via sendmail/mailx (available on most RHEL)
    email:
      enabled: false
      recipients: "oncall@yourcompany.com"
      from: "gg-monitor@yourcompany.com"

    # Slack incoming webhook
    slack:
      enabled: false
      webhook_url: "https://hooks.slack.com/services/T00/B00/xxx"
      channel: "#gg-alerts"

    # PagerDuty Events API v2
    pagerduty:
      enabled: false
      routing_key: "your-pagerduty-integration-key"

    # Generic webhook (SNS, Teams, custom)
    webhook:
      enabled: false
      url: "https://your-endpoint.com/alerts"
      method: "POST"                  # POST or GET
      headers: "Content-Type: application/json"

    # Log file (always enabled as fallback)
    log_file: "/var/log/gg-monitor/alerts.log"

# -------------------------------------------------------------------
# Audit
# -------------------------------------------------------------------
audit:
  parallel_workers: 4                 # conservative — 4 concurrent Oracle queries

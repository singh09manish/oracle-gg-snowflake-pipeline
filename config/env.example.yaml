# Copy to env.yaml and fill in values. Do NOT commit env.yaml.

oracle_rds:
  host: your-rds-endpoint.region.rds.amazonaws.com
  port: 1521
  service_name: ORCL
  user: gg_extract_user
  # password: set via env var ORACLE_PASSWORD or Secrets Manager

snowflake:
  account: your_account          # e.g. xy12345.us-east-1
  warehouse: YOUR_WH
  database: YOUR_DB
  role: GG_ROLE
  user: gg_snowflake_user
  # password: set via env var SNOWFLAKE_PASSWORD or Secrets Manager

aws:
  region: us-east-1

secrets:
  oracle_password_secret_id: /prod/rds-oracle/gg_extract_password
  snowflake_password_secret_id: /prod/snowflake/gg_snowflake_password

paths:
  logs_dir: /var/log/oracle-gg-snowflake-pipeline
  reports_dir: /var/log/oracle-gg-snowflake-pipeline/reports
